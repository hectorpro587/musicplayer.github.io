<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicPlayer | Reproductor de musica</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --glow: rgba(99, 102, 241, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: 0.5s ease;
        }

        .player-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 0 20px var(--glow), 0 10px 25px rgba(0,0,0,0.5);
            width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .lang-container { position: absolute; top: 20px; right: 20px; }
        
        #lang-select {
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--primary);
            padding: 5px 10px;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            font-size: 0.8rem;
        }

        .vis-wrapper {
            width: 100%;
            height: 120px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        #visualizer { width: 100%; height: 100%; display: block; }

        .info { text-align: center; margin-bottom: 15px; min-height: 70px; width: 100%; }
        #title { font-size: 1.2rem; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #artist { opacity: 0.6; font-size: 0.9rem; margin: 8px 0; }

        /* PROGRESO Y TIEMPO */
        .progress-wrapper { width: 100%; margin-bottom: 25px; }
        .progress-container {
            background: #334155;
            height: 8px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
        }
        .progress-bar {
            background: var(--primary);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 12px var(--primary);
            pointer-events: none;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: bold;
            text-shadow: 0 0 5px var(--glow);
        }

        .controls { display: flex; align-items: center; gap: 25px; }
        button {
            background: none; border: none; color: white;
            cursor: pointer; font-size: 2rem; transition: 0.3s;
        }
        button:hover { color: var(--primary); transform: scale(1.1); }
        
        #play-btn {
            background: var(--primary); width: 65px; height: 65px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--primary);
        }

        .playlist-container {
            width: 100%;
            max-height: 100px;
            overflow-y: auto;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
        }
        .playlist-item {
            padding: 8px; font-size: 0.8rem; cursor: pointer; border-radius: 6px; margin-bottom: 4px;
        }
        .playlist-item.active { 
            background: rgba(255,255,255,0.05); color: var(--accent); border-left: 3px solid var(--primary);
        }

        .file-input-wrapper { margin-top: 20px; }
        .custom-file-upload {
            padding: 10px 20px; border: 1px solid var(--primary);
            border-radius: 30px; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .custom-file-upload:hover { background: var(--primary); }
        
        .github-link {
            margin-top: 20px;
            color: #64748b;
            font-size: 1.6rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .github-link:hover { color: var(--primary); transform: rotate(10deg); }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="lang-container">
        <select id="lang-select">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="pt">Português</option>
            <option value="fr">Français</option>
            <option value="ko">한국어</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <div class="info">
        <h2 id="title">---</h2>
        <p id="artist">---</p>
    </div>

    <div class="vis-wrapper">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="progress-wrapper">
        <div class="progress-container" id="progress-outer">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn">⏮</button>
        <button id="play-btn">▶</button>
        <button id="next-btn">⏭</button>
    </div>

    <div class="playlist-container" id="playlist"></div>

    <div class="file-input-wrapper">
        <label class="custom-file-upload">
            <input type="file" id="audio-upload" accept="audio/*" multiple>
            <span id="upload-text">Cargar</span> 📁
        </label>
    </div>

    <a href="https://github.com/hectorpro587/musicplayer.github.io" class="github-link" target="_blank">
        <i class="fa-brands fa-github"></i>
    </a>
    
    <audio id="audio-element" crossorigin="anonymous"></audio>
</div>

<script>
    const audio = document.getElementById('audio-element');
    const playBtn = document.getElementById('play-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressOuter = document.getElementById('progress-outer');
    const timeDisplay = document.getElementById('current-time');
    const durationDisplay = document.getElementById('duration');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const uploadText = document.getElementById('upload-text');
    const langSelect = document.getElementById('lang-select');
    const playlistElement = document.getElementById('playlist');
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    
    let songs = [];
    let currentIndex = 0;
    let isPlaying = false;
    let audioCtx, analyser, source, dataArray;

    const themes = {
        es: { color: '#6366f1', accent: '#38bdf8', noSongs: "Sin canciones", prompt: "Carga música para empezar", upload: "Cargar Canciones 📁" },
        en: { color: '#ec4899', accent: '#fbcfe8', noSongs: "No songs", prompt: "Upload music to start", upload: "Upload Songs 📁" },
        pt: { color: '#22c55e', accent: '#bbf7d0', noSongs: "Sem músicas", prompt: "Carregue músicas para começar", upload: "Carregar Músicas 📁" },
        fr: { color: '#eab308', accent: '#fef08a', noSongs: "Pas de chansons", prompt: "Charger de la musique", upload: "Charger des chansons 📁" },
        ko: { color: '#a855f7', accent: '#e9d5ff', noSongs: "노래 없음", prompt: "음악을 업로드하세요", upload: "노래 업로드 📁" },
        ja: { color: '#f43f5e', accent: '#fecdd3', noSongs: "曲がありません", prompt: "音楽をアップロード", upload: "曲をアップロード 📁" }
    };

    function updateTheme() {
        const theme = themes[langSelect.value];
        document.documentElement.style.setProperty('--primary', theme.color);
        document.documentElement.style.setProperty('--accent', theme.accent);
        document.documentElement.style.setProperty('--glow', `${theme.color}80`);
        uploadText.innerText = theme.upload;
        if (songs.length === 0) {
            title.innerText = theme.noSongs;
            artist.innerText = theme.prompt;
        }
    }

    langSelect.onchange = updateTheme;

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function setupAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (canvas.width !== canvas.clientWidth) {
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isPlaying) return;
        analyser.getByteFrequencyData(dataArray);
        const color = themes[langSelect.value].color;
        const barWidth = (canvas.width / dataArray.length) * 2.5;
        let x = 0;
        for (let i = 0; i < dataArray.length; i++) {
            const h = (dataArray[i] / 255) * canvas.height;
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.fillRect(x, canvas.height - h, barWidth - 1, h);
            x += barWidth;
        }
    }

    progressOuter.onclick = (e) => {
        if (!audio.duration) return;
        audio.currentTime = (e.offsetX / progressOuter.clientWidth) * audio.duration;
    };

    audio.ontimeupdate = () => {
        const percent = (audio.currentTime / audio.duration) * 100 || 0;
        progressBar.style.width = `${percent}%`;
        timeDisplay.innerText = formatTime(audio.currentTime);
        durationDisplay.innerText = formatTime(audio.duration);
    };

    document.getElementById('audio-upload').onchange = (e) => {
        const newFiles = Array.from(e.target.files);
        if (newFiles.length > 0) {
            const isFirst = songs.length === 0;
            songs = [...songs, ...newFiles];
            renderPlaylist();
            if (isFirst) loadSong(0);
        }
    };

    function loadSong(index) {
        currentIndex = index;
        const file = songs[index];
        audio.src = URL.createObjectURL(file);
        title.innerText = file.name.replace(/\.[^/.]+$/, "");
        artist.innerText = "Ready";
        renderPlaylist();
        if (isPlaying) audio.play();
    }

    function renderPlaylist() {
        playlistElement.innerHTML = '';
        songs.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = `playlist-item ${i === currentIndex ? 'active' : ''}`;
            item.innerText = `${i + 1}. ${song.name.substring(0, 30)}`;
            item.onclick = () => loadSong(i);
            playlistElement.appendChild(item);
        });
    }

    playBtn.onclick = () => {
        if (!songs.length) return;
        setupAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (isPlaying) {
            audio.pause();
            playBtn.innerHTML = '▶';
        } else {
            audio.play();
            playBtn.innerHTML = '⏸';
        }
        isPlaying = !isPlaying;
    };

    document.getElementById('next-btn').onclick = () => songs.length && loadSong((currentIndex + 1) % songs.length);
    document.getElementById('prev-btn').onclick = () => songs.length && loadSong((currentIndex - 1 + songs.length) % songs.length);
    audio.onended = () => document.getElementById('next-btn').click();

    updateTheme();
</script>
</body>
</html>
